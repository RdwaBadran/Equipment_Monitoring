version: "3.8"

# ─────────────────────────────────────────────────────────────────────────────
# Equipment Monitor — Full Stack docker-compose
#
# TWO WAYS TO RUN THIS PROJECT:
#
#   Option A — Full Docker (recommended for submission reproducibility)
#     docker-compose --profile full up -d
#     # Then open http://localhost:8000
#
#   Option B — Hybrid (infra in Docker, Python services local) — faster dev
#     docker-compose up -d              # starts only kafka, zookeeper, timescaledb
#     python run.py                     # starts cv, consumer, ui on host
#
# NOTE: The cv_service profile requires the YOLOv8 model to be downloaded.
#       On first run it auto-downloads (~50 MB). Needs internet access.
#       Place your video as ./videos/video1.mp4 before starting.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Zookeeper (required by Kafka) ──────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka (message broker) ──────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # PLAINTEXT     → host machine connects via localhost:9092
      # PLAINTEXT_INTERNAL → Docker containers connect via kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── TimescaleDB (time-series database) ─────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: timescaledb
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: equipment_db
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d equipment_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── DB Consumer (Kafka → TimescaleDB) ──────────────────────────────────────
  # Only started when --profile full is passed
  consumer_service:
    build:
      context: ./consumer_service
      dockerfile: Dockerfile
    container_name: consumer_service
    profiles: ["full"]
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://admin:admin123@timescaledb:5432/equipment_db
      # Use internal Kafka address (Docker-to-Docker)
      KAFKA_SERVERS: kafka:29092
    networks:
      - app_network
    restart: on-failure

  # ── CV Service (video processing + Kafka producer) ──────────────────────────
  # Only started when --profile full is passed
  cv_service:
    build:
      context: ./cv_service
      dockerfile: Dockerfile
    container_name: cv_service
    profiles: ["full"]
    depends_on:
      kafka:
        condition: service_healthy
      consumer_service:
        condition: service_started
    environment:
      VIDEO_PATH: /videos/video1.mp4
      MODEL_PATH: /app/yolov8m.pt
      CONFIDENCE: "0.35"
      PROCESS_EVERY: "5"
      KAFKA_SERVERS: kafka:29092
    volumes:
      # Mount local videos/ folder so CV service can read input and write output
      - ./videos:/videos
    networks:
      - app_network
    restart: on-failure

  # ── UI Service (FastAPI dashboard) ──────────────────────────────────────────
  # Only started when --profile full is passed
  ui_service:
    build:
      context: ./ui_service
      dockerfile: Dockerfile
    container_name: ui_service
    profiles: ["full"]
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://admin:admin123@timescaledb:5432/equipment_db
    ports:
      - "8000:8000"
    volumes:
      # Share videos/ folder so UI can read latest_frame.jpg from CV service
      - ./videos:/videos
    networks:
      - app_network
    restart: on-failure


volumes:
  timescale_data:


networks:
  app_network:
    driver: bridge